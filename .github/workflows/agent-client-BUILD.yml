name: BUILD agent-client

on:
  push:
    paths:
      - 'src/agent_client/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Login to GitHub Packages Docker registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: src/agent_client
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/agent-client:latest
          ghcr.io/${{ github.repository }}/agent-client:${{ github.sha }}
